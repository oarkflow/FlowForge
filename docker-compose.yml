# ==============================================================================
# FlowForge — Production Docker Compose
# Usage: docker compose up -d
# ==============================================================================

services:
  # --------------------------------------------------------------------------
  # Backend API Server
  # --------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: flowforge-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - flowforge-data:/data
    environment:
      - DATABASE_PATH=${DATABASE_PATH:-/data/flowforge.db}
      - PORT=${BACKEND_PORT:-8080}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ARTIFACT_STORAGE_BACKEND=${ARTIFACT_STORAGE_BACKEND:-local}
      - ARTIFACT_STORAGE_PATH=${ARTIFACT_STORAGE_PATH:-/data/artifacts}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - flowforge

  # --------------------------------------------------------------------------
  # Frontend (SolidJS served via nginx)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: flowforge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flowforge

  # --------------------------------------------------------------------------
  # Agent (optional — uncomment to run a local agent)
  # --------------------------------------------------------------------------
  # agent:
  #   build:
  #     context: .
  #     dockerfile: deploy/docker/Dockerfile.agent
  #   container_name: flowforge-agent
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - agent-workspaces:/data/workspaces
  #   environment:
  #     - SERVER_URL=http://backend:8080
  #     - AGENT_NAME=local-agent-1
  #     - AGENT_TOKEN=${AGENT_TOKEN:-}
  #     - EXECUTOR_TYPE=docker
  #     - LOG_LEVEL=${LOG_LEVEL:-info}
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   networks:
  #     - flowforge

volumes:
  flowforge-data:
    driver: local
  # agent-workspaces:
  #   driver: local

networks:
  flowforge:
    driver: bridge
