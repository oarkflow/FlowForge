# ==============================================================================
# Docker Compose — Laravel PHP + Golang HTTP Server + Databases
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      laravel:
        condition: service_healthy
      golang:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  # ---------------------------------------------------------------------------
  # Laravel PHP Application
  # ---------------------------------------------------------------------------
  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    image: ${IMAGE_PREFIX:-myapp}-laravel:latest
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-laravel
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-laravel}
      - DB_USERNAME=${MYSQL_USER:-laravel}
      - DB_PASSWORD=${MYSQL_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - frontend
      - laravel-backend

  # ---------------------------------------------------------------------------
  # Golang HTTP Server
  # ---------------------------------------------------------------------------
  golang:
    build:
      context: ./golang
      dockerfile: Dockerfile
    image: ${IMAGE_PREFIX:-myapp}-golang:latest
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-golang
    environment:
      - APP_ENV=production
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-goapp}
      - DB_USER=${POSTGRES_USER:-goapp}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - frontend
      - golang-backend

  # ---------------------------------------------------------------------------
  # MySQL (for Laravel)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-secret}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-laravel}
      - MYSQL_USER=${MYSQL_USER:-laravel}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - laravel-backend

  # ---------------------------------------------------------------------------
  # PostgreSQL (for Golang)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-goapp}
      - POSTGRES_USER=${POSTGRES_USER:-goapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - golang-backend

  # ---------------------------------------------------------------------------
  # Redis (shared cache / session / queue)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - laravel-backend
      - golang-backend

volumes:
  mysql-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  frontend:
    driver: bridge
  laravel-backend:
    driver: bridge
    internal: true
  golang-backend:
    driver: bridge
    internal: true
