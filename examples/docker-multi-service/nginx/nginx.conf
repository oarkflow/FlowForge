worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream: Laravel PHP-FPM
    upstream laravel {
        server laravel:9000;
    }

    # Upstream: Go HTTP server
    upstream golang {
        server golang:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 64M;

        # ---------------------------------------------------------------
        # Laravel routes (PHP-FPM) — served under /web or root
        # ---------------------------------------------------------------
        location / {
            root /var/www/html/public;
            index index.php;
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            root /var/www/html/public;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass laravel;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        # ---------------------------------------------------------------
        # Go API routes — under /api/
        # ---------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://golang;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 10;
        }

        # Go health endpoint
        location /api/health {
            proxy_pass http://golang/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Go WebSocket endpoint
        location /ws {
            proxy_pass http://golang;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600;
        }

        # ---------------------------------------------------------------
        # Static assets (served directly by Nginx)
        # ---------------------------------------------------------------
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/html/public;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
