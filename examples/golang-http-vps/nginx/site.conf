server {
    listen 80;
    server_name goapp.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name goapp.example.com;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/goapp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goapp.example.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 32M;

    access_log /var/log/nginx/goapp-access.log;
    error_log  /var/log/nginx/goapp-error.log;

    # Serve static frontend assets directly via Nginx (bypass Go)
    location /static/ {
        alias /var/www/goapp/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve frontend SPA assets
    location /assets/ {
        alias /var/www/goapp/static/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API requests → Go backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        access_log off;
    }

    # WebSocket support (if needed)
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-API, non-static routes
    location / {
        root /var/www/goapp/static;
        try_files $uri $uri/ /index.html;
    }
}
